<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAL OS</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<div class="container">

    <div id="eye"></div>

    <div class="screen-title">HOME</div>

    <h1>HAL 9000</h1>

    <div id="status">
        REMOTE LINK ACTIVE
    </div>

    <div class="info">
        <span>TEMPERATURE</span>
        <span id="temp">22.4 °C</span>
    </div>

    <div class="info">
        <span>HUMIDITY</span>
        <span id="hum">46 %</span>
    </div>

    <div class="info">
        <span>TIME</span>
        <span id="clock"></span>
    </div>

    <div class="navigation">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div id="console"></div>

</div>

<script src="app.js"></script>

</body>
</html>
